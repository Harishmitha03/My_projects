<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Homepage - Workplace Access System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }
    /* Left panel styling */
    nav {
      width: 220px;
      background: linear-gradient(180deg, #0a1f44, #0d3c61); /* dark blue gradient */
      padding: 40px 25px;   /* extra spacing for neatness */
      height: 100vh;
      box-shadow: 2px 0 8px rgba(0,0,0,0.3);
      color: #fff;
    }
    nav h2 {
      margin-top: 0;
      font-size: 22px;
      color: #fff;
      margin-bottom: 30px;
      text-align: center;
      border-bottom: 2px solid rgba(255,255,255,0.3);
      padding-bottom: 12px;
    }
    nav a {
      display: block;
      margin: 20px 0;       /* more spacing between links */
      text-decoration: none;
      color: #e0e0e0;
      font-weight: bold;
      padding: 12px;
      border-radius: 6px;
      transition: background 0.3s, transform 0.2s, color 0.3s;
    }
    nav a:hover {
      background: rgba(255,255,255,0.15);
      color: #ffffff;
      transform: translateX(6px);
    }
    /* Main content area */
    main {
      flex: 1;
      padding: 50px;
      background-color: #f9f9f9;
    }
    main h1 {
      color: #0a1f44;
    }
  </style>
</head>
<body>
  <!-- Left panel navigation -->
  <nav>
    <h2>Navigation</h2>
    <a href="homepage.html">🏠 Homepage</a>
    <a href="service_catalog.html">📑 Service Catalog</a>
    <a href="my_requests.html">📂 My Requests</a>
    <a href="my_approvals.html">✅ My Approvals</a>
  </nav>

  <!-- Main content -->
  <main>
    <h1>Welcome to Workplace Access & Resource Request System</h1>
    <p>This system helps employees raise requests for workplace access, equipment, facilities, and general services in a controlled and trackable way.</p>
  </main>
</body>
</html>
