<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ResourceFlow | Dashboard</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-800">ResourceFlow</h1>
            <div class="space-x-2">
                <a href="/export/csv" class="bg-green-600 text-white px-4 py-2 rounded">Export CSV</a>
            </div>
        </header>

        <!-- Request Form -->
        <div class="bg-white p-6 rounded shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4">Raise New Request</h2>
            <form action="/submit" method="POST" class="flex gap-4">
                <select name="category" class="border p-2 rounded">
                    <option>System Access</option>
                    <option>Equipment</option>
                    <option>Facilities</option>
                </select>
                <input type="text" name="description" placeholder="Describe your need..." class="border p-2 flex-grow rounded" required>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded">Submit</button>
            </form>
        </div>

        <!-- History Table -->
        <div class="bg-white rounded shadow-md overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4 border-b">ID</th>
                        <th class="p-4 border-b">Category</th>
                        <th class="p-4 border-b">Status</th>
                        <th class="p-4 border-b">Created</th>
                        <th class="p-4 border-b">Actions (Manager)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for req in requests %}
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 border-b">REQ-{{ req.id }}</td>
                        <td class="p-4 border-b">{{ req.category }}</td>
                        <td class="p-4 border-b">
                            <span class="px-2 py-1 rounded text-sm 
                            {% if req.status == 'Pending' %} bg-yellow-100 text-yellow-800 {% else %} bg-blue-100 text-blue-800 {% endif %}">
                                {{ req.status }}
                            </span>
                        </td>
                        <td class="p-4 border-b text-sm">{{ req.created_at.strftime('%Y-%m-%d') }}</td>
                        <td class="p-4 border-b">
                            <a href="/update/{{req.id}}/Approved" class="text-blue-600 mr-2">Approve</a>
                            <a href="/update/{{req.id}}/Fulfilled" class="text-green-600">Fulfill</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
